when:
  - event: [manual]

steps:
  print_portainer_url:
    image: alpine:3.20
    environment:
      PORTAINER_URL:
        from_secret: portainer_url
      PORTAINER_STACK_ID:
        from_secret: portainer_stack_id
      PORTAINER_ENDPOINT_ID:
        from_secret: portainer_endpoint_id
    commands:
      - echo "$PORTAINER_URL"
      - echo "$PORTAINER_URL/api/stacks"
      - echo "stack=$PORTAINER_STACK_ID endpoint=$PORTAINER_ENDPOINT_ID"
