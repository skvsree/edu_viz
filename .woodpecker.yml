when:
  - event: [manual]

steps:
  check_portainer_api:
    image: curlimages/curl:8.7.1
    environment:
      PORTAINER_URL:
        from_secret: portainer_url
      PORTAINER_TOKEN:
        from_secret: portainer_token
    commands:
      - |
        echo "Checking $PORTAINER_URLapi/stacks"
        curl -i -sS \
          -H "X-API-Key: $PORTAINER_TOKEN" \
          "$PORTAINER_URL/api/stacks"
