when:
  - event: [push, manual]
    branch: [main]

steps:
  deploy_portainer:
    image: curlimages/curl:8.7.1
    environment:
      PORTAINER_URL:
        from_secret: portainer_url
      PORTAINER_TOKEN:
        from_secret: portainer_token
      PORTAINER_STACK_ID:
        from_secret: portainer_stack_id
      PORTAINER_ENDPOINT_ID:
        from_secret: portainer_endpoint_id
    commands:
      - 'echo "URL=$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID/git/redeploy?endpointId=$PORTAINER_ENDPOINT_ID"'
      - 'curl -sS -X POST -H "X-API-Key: $PORTAINER_TOKEN" "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID/git/redeploy?endpointId=$PORTAINER_ENDPOINT_ID"'
