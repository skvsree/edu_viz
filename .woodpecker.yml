when:
  - event: [manual]
    branch: [main]

steps:
  inspect_stack:
    image: curlimages/curl:8.7.1
    environment:
      PORTAINER_URL:
        from_secret: portainer_url
      PORTAINER_TOKEN:
        from_secret: portainer_token
      PORTAINER_STACK_ID:
        from_secret: portainer_stack_id
    commands:
      - |
        echo "Inspecting stack $PORTAINER_STACK_ID"
        curl -sS \
          -H "X-API-Key: $PORTAINER_TOKEN" \
          "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID"
