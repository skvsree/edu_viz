when:
  - event: [push, manual]
  - branch: [main]

steps:
  build_and_push:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: ghcr.io/skvsree/edu_viz
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:7}
      dockerfile: Dockerfile
      context: .
      registry: ghcr.io
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token

  deploy_portainer:
    image: curlimages/curl:8.7.1
    commands:
      - >
        curl -sS -X POST
        -H "X-API-Key: ${PORTAINER_TOKEN}"
        "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}/git/redeploy?endpointId=${PORTAINER_ENDPOINT_ID}"
    environment:
      PORTAINER_URL:
        from_secret: portainer_url
      PORTAINER_TOKEN:
        from_secret: portainer_token
      PORTAINER_ENDPOINT_ID:
        from_secret: portainer_endpoint_id
      PORTAINER_STACK_ID:
        from_secret: portainer_stack_id
