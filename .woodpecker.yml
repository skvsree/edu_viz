when:
  - event: [manual]

steps:
  deploy_portainer:
    image: curlimages/curl:8.7.1
    environment:
      PORTAINER_TOKEN:
        from_secret: portainer_token
    commands:
      - |
        echo "Deploying stack 30 on endpoint 3"
  
        curl -sS -X PUT \
          -H "X-API-Key: $PORTAINER_TOKEN" \
          -H "Content-Type: application/json" \
          "https://port.selviz.in/api/stacks/30?endpointId=3" \
          -d '{"pullImage":true}'
