when:
  - event: [push, manual]
    branch: [main]

steps:
  - name: deploy_portainer
    image: alpine:3.20
    environment:
      PORTAINER_TOKEN:
        from_secret: portainer_token
    commands:
      - apk add --no-cache curl jq
      - STACK_CONTENT=$(jq -Rs . < docker-compose.yml)
      - |
        curl -s -H "X-API-Key: $PORTAINER_TOKEN" "https://port.selviz.in/api/stacks/30?endpointId=3"
