when:
  - event: [manual]

steps:
  check_portainer_api:
    image: curlimages/curl:8.7.1
    environment:
      PORTAINER_TOKEN:
        from_secret: portainer_token
    commands:
      - |
        curl -i -sS \
          -H "X-API-Key: $PORTAINER_TOKEN" \
          "https://port.selviz.in/api/stacks"
