when:
  - event: [manual]

steps:
  debug_secrets:
    image: alpine:3.20
    environment:
      PORTAINER_URL:
        from_secret: portainer_url
      PORTAINER_TOKEN:
        from_secret: portainer_token
      PORTAINER_STACK_ID:
        from_secret: portainer_stack_id
      PORTAINER_ENDPOINT_ID:
        from_secret: portainer_endpoint_id
    commands:
      - test -n "$PORTAINER_URL" && echo "PORTAINER_URL present" || echo "PORTAINER_URL missing"
      - test -n "$PORTAINER_TOKEN" && echo "PORTAINER_TOKEN present" || echo "PORTAINER_TOKEN missing"
      - test -n "$PORTAINER_STACK_ID" && echo "PORTAINER_STACK_ID present" || echo "PORTAINER_STACK_ID missing"
      - test -n "$PORTAINER_ENDPOINT_ID" && echo "PORTAINER_ENDPOINT_ID present" || echo "PORTAINER_ENDPOINT_ID missing"
