{% extends "base.html" %}
{% block content %}
<section class="card" style="max-width: 520px; margin: 0 auto;">
  <p class="panel-label">Create your edu selviz account</p>
  <h1 class="section-title">Register</h1>
  <p class="muted section-copy">Set up access and start building a more organized study workflow.</p>

  <form method="post" class="stack-md">
    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
    </div>
    <div>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />
    </div>
    <button type="submit" class="button">Create account</button>
  </form>
</section>
{% endblock %}
