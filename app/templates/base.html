<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'edu selviz' }}</title>
    <meta
      name="description"
      content="edu selviz is a focused study workspace for spaced repetition, deck management, and calm daily review."
    />
    <meta name="theme-color" content="#07111f" />
    <link rel="icon" type="image/jpeg" href="{{ static_asset_url('brand/logo.jpg') }}" />
    <link rel="apple-touch-icon" href="{{ static_asset_url('brand/logo.jpg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="{{ static_asset_url('vendor/htmx.min.js') }}"></script>
    <link rel="stylesheet" href="{{ static_asset_url('styles.css') }}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="page-shell">
      <header class="topbar">
        <a href="/" class="brand-mark" aria-label="edu selviz home">
          <span class="brand-mark__media">
            <img
              src="{{ static_asset_url('brand/logo.jpg') }}"
              alt="edu selviz logo"
              class="brand-mark__image"
            />
          </span>
          <span class="brand-mark__copy">
            <strong>edu selviz</strong>
            <small>Professional study workflow</small>
          </span>
        </a>
        <nav class="topbar-nav" aria-label="Primary navigation">
          {% if user %}
            <a href="/dashboard">Workspace</a>
            <a href="/review">Review</a>
            {% if user.role in ["admin", "system_admin"] %}
              <a href="/settings">Settings</a>
            {% endif %}
            <form action="/logout" method="post">
              <button type="submit" class="button button-secondary button-small">Logout</button>
            </form>
          {% else %}
            <a href="/">Home</a>
            <a href="/login">Sign in</a>
          {% endif %}
        </nav>
      </header>

      <main class="page-content">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <small>{{ footer_copyright_text }}</small>
      </footer>
    </div>
  </body>
</html>
