{% macro browse_item(deck, favorite_deck_ids, writable_deck_ids) %}
{% set can_write = deck.id|string in writable_deck_ids %}
<article class="browse-item browse-item--deck"
  data-item-type="deck"
  data-item-id="{{ deck.id }}"
  data-deck-id="{{ deck.id }}"
  data-can-write="{{ 'true' if can_write else 'false' }}"
>
  {% if can_write %}
    <div class="item-cb-wrap">
      <input type="checkbox" class="item-cb" data-type="deck" data-id="{{ deck.id }}" />
    </div>
  {% endif %}

  <button
    type="button"
    class="deck-favorite-btn{% if deck.id|string in favorite_deck_ids %} deck-favorite-btn--active{% endif %}"
    data-deck-id="{{ deck.id }}"
    aria-label="{% if deck.id|string in favorite_deck_ids %}Remove from favorites{% else %}Add to favorites{% endif %}"
    title="{% if deck.id|string in favorite_deck_ids %}Remove from favorites{% else %}Add to favorites{% endif %}"
  >
    {% if deck.id|string in favorite_deck_ids %}
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    {% else %}
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    {% endif %}
  </button>

  <a href="/decks/{{ deck.id }}" class="deck-item-card__link">
    <span class="deck-item-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M7.5 3.75A2.75 2.75 0 0 0 4.75 6.5v9A2.75 2.75 0 0 0 7.5 18.25h6A2.75 2.75 0 0 0 16.25 15.5v-9A2.75 2.75 0 0 0 13.5 3.75z"></path>
        <path d="M10.5 6.75A2.75 2.75 0 0 0 7.75 9.5v8A2.75 2.75 0 0 0 10.5 20.25h6A2.75 2.75 0 0 0 19.25 17.5v-8A2.75 2.75 0 0 0 16.5 6.75z" opacity="0.72"></path>
      </svg>
    </span>
    <span class="deck-item__text">
      <span class="deck-item-name">{{ deck.name }}</span>
      <span class="deck-item-desc">{{ deck.description or 'Study deck' }}</span>
    </span>
  </a>
</article>
{% endmacro %}
