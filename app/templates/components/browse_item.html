{% macro browse_item(deck, favorite_deck_ids, can_manage=False) %}
<article class="browse-item browse-item--deck"
  data-item-type="deck"
  data-item-id="{{ deck.id }}"
  data-deck-id="{{ deck.id }}"
>
  {% if can_manage %}
    <div class="item-cb-wrap">
      <input type="checkbox" class="item-cb" data-type="deck" data-id="{{ deck.id }}" />
    </div>
  {% endif %}

  <a href="/decks/{{ deck.id }}" class="deck-item-card__link">
    <span class="deck-item-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M7.5 3.75A2.75 2.75 0 0 0 4.75 6.5v9A2.75 2.75 0 0 0 7.5 18.25h6A2.75 2.75 0 0 0 16.25 15.5v-9A2.75 2.75 0 0 0 13.5 3.75z"></path>
        <path d="M10.5 6.75A2.75 2.75 0 0 0 7.75 9.5v8A2.75 2.75 0 0 0 10.5 20.25h6A2.75 2.75 0 0 0 19.25 17.5v-8A2.75 2.75 0 0 0 16.5 6.75z" opacity="0.72"></path>
      </svg>
    </span>
    <span class="deck-item__text">
      <span class="deck-item-name">{{ deck.name }}</span>
      <span class="deck-item-desc">{{ deck.description or 'Study deck' }}</span>
    </span>
  </a>
</article>
{% endmacro %}
