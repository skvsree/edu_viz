<article class="card review-card review-focus-card">
  <div class="review-card__body math-content">
    <div class="review-loading-ring"></div>
    {% if remaining is not none %}<p class="panel-label">{{ remaining }} card{% if remaining != 1 %}s{% endif %} left in this session</p>{% endif %}

    <div class="review-card__text review-card__text--prompt math-content">{{ card.front | safe }}</div>

    <details class="review-answer" hx-on:toggle="if (this.open && window.renderMathInElement) { renderMathInElement(this, { delimiters: [{left:'\\[', right:'\\]', display:true},{left:'$$', right:'$$', display:true},{left:'\\(', right:'\\)', display:false},{left:'$', right:'$', display:false}], ignoredTags:['script','noscript','style','textarea','pre','code'], throwOnError:false, trust:true }); }">
      <summary>Reveal answer</summary>
      <div class="review-card__text review-card__text--answer math-content">{{ card.back | safe }}</div>
    </details>
  </div>

  <form hx-post="/review/rate" hx-target="#review-area" hx-swap="innerHTML" hx-disabled-elt="this" hx-on--before-request="document.querySelector('.review-card').classList.add('review-loading')" class="review-rating-row">
    <input type="hidden" name="card_id" value="{{ card.id }}" />
    {% if review_deck %}<input type="hidden" name="deck_id" value="{{ review_deck.id }}" />{% endif %}
    {% if remaining is not none %}<input type="hidden" name="remaining" value="{{ remaining }}" />{% endif %}
    <button class="button button-rating button-rating--muted" name="rating" value="1">Again</button>
    <button class="button button-rating button-rating--warm" name="rating" value="2">Hard</button>
    <button class="button button-rating button-rating--cool" name="rating" value="3">Good</button>
    <button class="button button-rating button-rating--bright" name="rating" value="4">Easy</button>
  </form>
</article>
