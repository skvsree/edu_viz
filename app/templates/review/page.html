<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'Review | edu selviz' }}</title>
    <meta
      name="description"
      content="Focused review mode in edu selviz for calm, distraction-reduced spaced repetition."
    />
    <meta name="theme-color" content="#f5efe2" />
    <link rel="icon" type="image/jpeg" href="{{ static_asset_url('brand/review-logo.jpg') }}" />
    <link rel="apple-touch-icon" href="{{ static_asset_url('brand/review-logo.jpg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="{{ static_asset_url('vendor/htmx.min.js') }}"></script>
    <link rel="stylesheet" href="{{ static_asset_url('styles.css') }}" />
  </head>
  <body class="review-body">
    <div class="review-shell">
      <header class="review-topbar" aria-label="Review page header">
        <a href="/dashboard" class="review-brand brand-mark" aria-label="edu selviz workspace">
          <span class="review-brand__media brand-mark__media">
            <img
              src="{{ static_asset_url('brand/review-logo.jpg') }}"
              alt="edu selviz logo"
              class="review-brand__image brand-mark__image"
            />
          </span>
          <span class="review-brand__copy brand-mark__copy">
            <strong>edu selviz</strong>
            <small>Professional study workflow</small>
          </span>
        </a>
      </header>

      <main class="review-main">
        {% if review_limit %}
          <section id="review-area" class="review-area" hx-get="/review/next?remaining={{ review_limit }}{% if review_deck %}&deck_id={{ review_deck.id }}{% endif %}" hx-trigger="load" hx-swap="innerHTML"></section>
        {% else %}
          <section class="review-area">
            <article class="card review-focus-card stack-md review-launch-card">
              <div>
                <p class="panel-label">Start review</p>
                <h1 class="section-title">Choose how many flashcards to study</h1>
                <p class="muted">Generate as much as you want earlier. Pick the size of this review session only when you launch it.</p>
              </div>
              <form method="get" action="/review" class="stack-md">
                {% if review_deck %}<input type="hidden" name="deck_id" value="{{ review_deck.id }}" />{% endif %}
                <div>
                  <label>Cards for this session</label>
                  <select name="count">
                    {% for option in review_options %}<option value="{{ option }}">{{ option }} cards</option>{% endfor %}
                  </select>
                </div>
                <button type="submit" class="button">Start review</button>
              </form>
            </article>
          </section>
        {% endif %}
      </main>

      <footer class="site-footer site-footer--review">
        <small>{{ footer_copyright_text }}</small>
      </footer>
    </div>
  </body>
</html>
