<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'Review | edu selviz' }}</title>
    <meta
      name="description"
      content="Focused review mode in edu selviz for calm, distraction-reduced spaced repetition."
    />
    <meta name="theme-color" content="#f5efe2" />
    <link rel="icon" type="image/jpeg" href="{{ static_asset_url('brand/logo.jpg') }}" />
    <link rel="apple-touch-icon" href="{{ static_asset_url('brand/logo.jpg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="{{ static_asset_url('vendor/htmx.min.js') }}"></script>
    <link rel="stylesheet" href="{{ static_asset_url('styles.css') }}" />
  </head>
  <body class="review-body">
    <div class="review-shell">
      <header class="review-topbar" aria-label="Review session controls">
        <a href="/dashboard" class="review-topbar__back">Workspace</a>
        <span class="review-topbar__user">{{ user.email or user.identity_sub }}</span>
      </header>

      <main class="review-main">
        {% if review_deck %}
          <section class="card info-card">
            <p class="panel-label">Deck review</p>
            <h2 class="section-subtitle">{{ review_deck.name }}</h2>
            <p class="muted">You are reviewing cards only from this deck.</p>
          </section>
        {% endif %}
        <section id="review-area" class="review-area" hx-get="/review/next{% if review_deck %}?deck_id={{ review_deck.id }}{% endif %}" hx-trigger="load" hx-swap="innerHTML"></section>
      </main>

      <footer class="site-footer site-footer--review">
        <small>{{ footer_copyright_text }}</small>
      </footer>
    </div>
  </body>
</html>
