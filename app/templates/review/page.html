<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'Review | edu selviz' }}</title>
    <meta
      name="description"
      content="Focused review mode in edu selviz for calm, distraction-reduced spaced repetition."
    />
    <meta name="theme-color" content="#f5efe2" />
    <link rel="icon" type="image/jpeg" href="{{ static_asset_url('brand/review-logo.jpg') }}" />
    <link rel="apple-touch-icon" href="{{ static_asset_url('brand/review-logo.jpg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="{{ static_asset_url('vendor/htmx.min.js') }}"></script>
    <script>
      document.body.addEventListener('htmx:afterSwap', function(e) {
        const card = document.querySelector('.review-loading');
        if (card) {
          setTimeout(() => card.classList.remove('review-loading'), 300);
        }
      });
    </script>
    <script>
      function renderKaTeX(root) {
        root = root || document.getElementById('review-area') || document.body;
        if (typeof renderMathInElement === 'function') {
          try {
            renderMathInElement(root, {
              delimiters: [
                {left: '\\[', right: '\\]', display: true},
                {left: '$$', right: '$$', display: true},
                {left: '\\(', right: '\\)', display: false},
                {left: '$', right: '$', display: false}
              ],
              ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
              ignoredClasses: ['katex', 'math-content', 'cloze'],
              throwOnError: false,
              trust: true,
              macros: {
                "\\celsius": "{}^{\\circ}\\text{C}"
              }
            });
          } catch(e) {
            console.error('KaTeX render error:', e);
          }
        }
      }
      document.addEventListener("DOMContentLoaded", function() {
        renderKaTeX(document.getElementById('review-area'));
      });
      document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.target && event.target.id === 'review-area') {
          renderKaTeX(event.target);
        } else {
          renderKaTeX(document.getElementById('review-area'));
        }
      });
      document.body.addEventListener('htmx:afterSettle', function(event) {
        if (event.target && event.target.id === 'review-area') {
          renderKaTeX(event.target);
        }
      });
    </script>
    <style>
      .review-card__body{position:relative}
      .review-loading-ring{display:none;width:44px;height:44px;border:4px solid rgba(120,113,108,.2);border-top-color:rgba(120,113,108,.9);border-radius:50%;animation:rlspin .7s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10}
      .review-loading .review-loading-ring{display:block!important}
      .review-loading .review-card__body{opacity:.4}
      @keyframes rlspin{to{transform:translate(-50%,-50%) rotate(360deg)}}
       .review-body .button-rating[disabled]{opacity:.15!important;filter:grayscale(1)!important;border:3px dashed red!important}
       .math-content{display:block}
       .hl{background:#fff3a3;padding:0 0.2em;border-radius:0.2em}
     </style>
    <link rel="stylesheet" href="{{ static_asset_url('styles.css') }}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  </head>
  <body class="review-body">
    <div class="review-shell">
      <header class="review-topbar" aria-label="Review page header">
        <a href="/dashboard" class="review-brand brand-mark" aria-label="edu selviz workspace">
          <span class="brand-mark__media">
            <img
              src="{{ static_asset_url('brand/review-logo.jpg') }}"
              alt="edu selviz logo"
              class="brand-mark__image"
            />
          </span>
          <span class="brand-mark__copy">
            <strong>edu selviz</strong>
            <small>Professional study workflow</small>
          </span>
        </a>
      </header>

      <main class="review-main">
        <section id="review-area" class="review-area" hx-get="/review/next?{% if review_deck %}deck_id={{ review_deck.id }}{% endif %}{% if review_limit %}&remaining={{ review_limit }}{% endif %}" hx-trigger="load" hx-swap="innerHTML"></section>
      </main>

      <footer class="site-footer site-footer--review">
      </footer>
    </div>
  </body>
</html>
