services:
  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://srs:srs@pgbouncer:5432/srs
    depends_on:
      - pgbouncer
      - seaweedfs
    ports:
      - "18000:8000"
    volumes:
      - ./app/static:/app/app/static
      - media_data:/app/app/static/media

  seaweedfs:
    container_name: edu_viz-seaweedfs-1
    image: chrislusf/seaweedfs:3.90
    command: "server -dir=/data -ip=seaweedfs -master.port=9333 -volume.port=8080 -filer=true -filer.port=8888 -s3 -s3.port=8333 -master.volumeSizeLimitMB=256"
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: srs
      DB_PASSWORD: srs
      DB_NAME: srs
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      SERVER_IDLE_TIMEOUT: 600
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: srs
      POSTGRES_USER: srs
      POSTGRES_PASSWORD: srs
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  media_data:
  seaweedfs_data:
